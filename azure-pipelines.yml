trigger:
- main

pool:
  name: Default

stages:
- stage: Validate
  displayName: Validate Terraform
  jobs:
  - job: Validate
    steps:
    - script: terraform init -backend=false
      displayName: Terraform Init
      workingDirectory: $(Build.SourcesDirectory)
      env:
        ARM_SUBSCRIPTION_ID: c967d50f-7f21-4985-bd4f-1befa0e42d1a
        ARM_TENANT_ID: 068b196a-2d57-407f-a70d-3c0571c3266a
        ARM_USE_CLI: "true"
    - script: terraform validate
      displayName: Terraform Validate
      workingDirectory: $(Build.SourcesDirectory)

- stage: Plan
  displayName: Plan Terraform
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: Plan
    steps:
    - script: terraform init -backend-config="resource_group_name=rg-terraform-state" -backend-config="storage_account_name=tfstatepriyanka" -backend-config="container_name=tfstate" -backend-config="key=terraform.tfstate"
      displayName: Terraform Init
      workingDirectory: $(Build.SourcesDirectory)
      env:
        ARM_SUBSCRIPTION_ID: c967d50f-7f21-4985-bd4f-1befa0e42d1a
        ARM_TENANT_ID: 068b196a-2d57-407f-a70d-3c0571c3266a
        ARM_USE_CLI: "true"
    - script: terraform plan -var="admin_password=Admin@12345!" -out=tfplan
      displayName: Terraform Plan
      workingDirectory: $(Build.SourcesDirectory)
      env:
        ARM_SUBSCRIPTION_ID: c967d50f-7f21-4985-bd4f-1befa0e42d1a
        ARM_TENANT_ID: 068b196a-2d57-407f-a70d-3c0571c3266a
        ARM_USE_CLI: "true"
    - task: PublishPipelineArtifact@1
      displayName: Publish tfplan Artifact
      inputs:
        targetPath: $(Build.SourcesDirectory)/tfplan
        artifactName: tfplan

- stage: Apply
  displayName: Apply Terraform
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - job: Apply
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: Download tfplan Artifact
      inputs:
        artifactName: tfplan
        targetPath: $(Build.SourcesDirectory)
    - script: terraform init -backend-config="resource_group_name=rg-terraform-state" -backend-config="storage_account_name=tfstatepriyanka" -backend-config="container_name=tfstate" -backend-config="key=terraform.tfstate"
      displayName: Terraform Init
      workingDirectory: $(Build.SourcesDirectory)
      env:
        ARM_SUBSCRIPTION_ID: c967d50f-7f21-4985-bd4f-1befa0e42d1a
        ARM_TENANT_ID: 068b196a-2d57-407f-a70d-3c0571c3266a
        ARM_USE_CLI: "true"
    - script: terraform apply -auto-approve tfplan
      displayName: Terraform Apply
      workingDirectory: $(Build.SourcesDirectory)
      env:
        ARM_SUBSCRIPTION_ID: c967d50f-7f21-4985-bd4f-1befa0e42d1a
        ARM_TENANT_ID: 068b196a-2d57-407f-a70d-3c0571c3266a
        ARM_USE_CLI: "true"

- stage: Destroy
  displayName: Destroy Terraform
  dependsOn: Apply
  condition: succeeded()
  jobs:
  - job: WaitForApproval
    displayName: Manual Approval Gate
    pool: server
    steps:
    - task: ManualValidation@0
      displayName: Approve Destroy
      inputs:
        instructions: 'Review and approve to DESTROY all infrastructure'
        onTimeout: reject
  - job: Destroy
    displayName: Terraform Destroy
    dependsOn: WaitForApproval
    steps:
    - script: terraform init -backend-config="resource_group_name=rg-terraform-state" -backend-config="storage_account_name=tfstatepriyanka" -backend-config="container_name=tfstate" -backend-config="key=terraform.tfstate"
      displayName: Terraform Init
      workingDirectory: $(Build.SourcesDirectory)
      env:
        ARM_SUBSCRIPTION_ID: c967d50f-7f21-4985-bd4f-1befa0e42d1a
        ARM_TENANT_ID: 068b196a-2d57-407f-a70d-3c0571c3266a
        ARM_USE_CLI: "true"
    - script: terraform destroy -var="admin_password=Admin@12345!" -auto-approve
      displayName: Terraform Destroy
      workingDirectory: $(Build.SourcesDirectory)
      env:
        ARM_SUBSCRIPTION_ID: c967d50f-7f21-4985-bd4f-1befa0e42d1a
        ARM_TENANT_ID: 068b196a-2d57-407f-a70d-3c0571c3266a
        ARM_USE_CLI: "true"
